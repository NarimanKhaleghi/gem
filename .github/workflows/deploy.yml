# نام workflow
name: Deploy to GitHub Pages

# این workflow چه موقع اجرا بشه؟
on:
  push:
    branches: ["main"] # هر بار که روی branch اصلی (main) کد جدید ریختی
  workflow_dispatch: # همچنین قابلیت اجرای دستی رو هم اضافه می‌کنه

# اجازه‌های لازم برای انتشار
permissions:
  contents: read
  pages: write
  id-token: write

# فقط یک کار در این workflow
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # 1. کدهای ریپازیتوری رو دریافت کن
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js رو نصب کن (نسخه مناسب)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # یا هر نسخه‌ای که تو پروژه ات داری
          cache: 'npm'

      # 3. کتابخانه‌های مورد نیاز رو نصب کن
      - name: Install dependencies
        run: npm ci

      # 4. پروژه رو بساز (Build کن)
      - name: Build the project
        run: npm run build # این دستور خروجی رو در پوشه dist می‌ریزه

      # 5. فایل‌های ساخته شده (خروجی build) رو برای انتشار آماده کن
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # مسیر خروجی build که در مرحله قبل ساخته شد

      # 6. انتشار نهایی روی GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
